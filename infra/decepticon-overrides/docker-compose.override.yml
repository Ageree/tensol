# Docker Compose override for development workflows.
#
# Docker Compose automatically merges this file with docker-compose.yml when
# run from the same directory. The OSS installer (scripts/install.sh) does
# NOT download this file, so end users get only the base compose with
# skills baked into the sandbox image — they don't need a host-side
# ./skills/ directory to function.
#
# Developers who clone the repo (`make dev`, `make cli-dev`, benchmark
# harness, etc.) get the bind mount below, which shadows the baked /skills/
# in the running container with the working-tree copy. That makes skill
# edits hot-visible to the agent without rebuilding the sandbox image.
#
# To temporarily test the OSS path on a dev clone, override the merge:
#   docker compose -f docker-compose.yml up
# (skipping the override file).

services:
  sandbox:
    volumes:
      # Read-only bind: the agent never writes back into the skill library;
      # the host is the source of truth during development.
      - ./skills:/skills:ro

  langgraph:
    # [TENSOL OVERRIDE 2026-05-12] verifier agent's Neo4j tool calls
    # (validate_finding → kg_add_edge) use a sync bolt driver in the
    # async langgraph event loop. Default `langgraph dev` ships blockbuster
    # which raises `BlockingError: socket.sendall` mid-run. The opt-out is
    # the `--allow-blocking` CLI flag (env var alone is ignored because
    # the cli.py wrapper sets it only when the flag is passed; the worker
    # then reads it via os.getenv). Override the default CMD to include
    # the flag. Confirmed via scan #7+#8 failures. Once Decepticon
    # upstream switches verifier kg writes to the async driver, remove.
    command: ["langgraph", "dev", "--host", "0.0.0.0", "--port", "2024", "--no-browser", "--allow-blocking"]
    volumes:
      # [TENSOL OVERRIDE] Shadow the baked recon.md prompt with the
      # working-tree copy so the Tensol-side Rule 4b (KG_PERSISTENCE block —
      # forces recon to call kg_add_node(kind="vulnerability", ...) for each
      # finding, enabling downstream verifier validation) is hot-visible
      # without rebuilding the langgraph image.
      - ./decepticon/agents/prompts/recon.md:/app/decepticon/agents/prompts/recon.md:ro
