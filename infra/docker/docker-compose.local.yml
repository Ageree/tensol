# CyberStrike Hybrid — local development stack.
# Sprint 1: Postgres 16 + MinIO + queue-emulator placeholder.
# DO NOT use in production. No persistent data; volumes are local development only.

name: cyberstrike-hybrid

services:
  cs-postgres:
    image: postgres:16-alpine
    container_name: cs-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: cs
      POSTGRES_PASSWORD: cs
      POSTGRES_DB: cyberstrike
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    volumes:
      - cs-postgres-data:/var/lib/postgresql/data
    networks:
      - cs-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cs -d cyberstrike"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  cs-minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: cs-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: cs
      MINIO_ROOT_PASSWORD: cs-secret-local-only
    volumes:
      - cs-minio-data:/data
    networks:
      - cs-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  # Placeholder for the future Yandex Message Queue emulator.
  # Sprint 1 only validates orchestration; real adapter wiring lands in Sprint 7.
  cs-queue-emulator:
    image: alpine:3.20
    container_name: cs-queue-emulator
    restart: unless-stopped
    command: ["sh", "-c", "while true; do sleep 3600; done"]
    networks:
      - cs-net
    healthcheck:
      test: ["CMD-SHELL", "true"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 2s

volumes:
  cs-postgres-data:
  cs-minio-data:

networks:
  cs-net:
    driver: bridge
