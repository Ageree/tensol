# Sthrip production stack — single-node VM.
#
# Only the server runs here. The SPA (apps/site) is built to static files and
# served directly by Caddy on the host from /opt/tensol/site-dist (see
# infra/prod/Caddyfile). Caddy also terminates TLS for Sthrip hostnames and
# reverse-proxies api.sthrip.dev -> 127.0.0.1:3000.
#
# Usage (from repo root, after `infra/prod/deploy.sh` provisions the host):
#
#   cd /opt/tensol/repo/infra/prod
#   docker compose -f docker-compose.prod.yml up -d
#
# Required env file: /opt/tensol/.env.prod  (template at .env.prod.example).

name: tensol-prod

services:
  server:
    image: tensol-server:latest
    build:
      context: ../..
      dockerfile: server/Dockerfile
    container_name: tensol-server
    restart: unless-stopped
    env_file:
      - /opt/tensol/.env.prod
    environment:
      NODE_ENV: production
      PORT: "3000"
    volumes:
      # SQLite database + WAL/SHM files persist across container restarts.
      - /opt/tensol/data:/app/server/data
      # @sparticuz/chromium-min unpacks the headless binary on first PDF
      # render. Keep it on the host so a `docker compose pull` doesn't
      # re-extract ~120 MB every redeploy.
      - /opt/tensol/chrome-cache:/home/bun/.cache/puppeteer
      # GCP Service Account JSON (read-only). The path inside the container
      # MUST match GOOGLE_APPLICATION_CREDENTIALS in /opt/tensol/.env.prod
      # (currently /opt/tensol/.gcp/tensol-vm-spawner.json). Per memory
      # project_tensol_gcp_pivot_2026-05-22.md.
      # NOTE: this container runs as the bun user (uid 1000); deploy.sh step
      # 4/9 chmod 0644s the *.json so google-auth-library can read it. Without
      # that, GCP auth fails and every scan dangles in vm_provisioning.
      - /opt/tensol/.gcp:/opt/tensol/.gcp:ro
    ports:
      # Bind to loopback only — Caddy on the host reverse-proxies the public
      # api.sthrip.dev endpoint to this port. Nothing from the internet hits
      # :3000 directly.
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  pr-execution-worker:
    profiles:
      - pr-execution
    image: tensol-pr-execution-worker:latest
    build:
      context: ../../vps-agent
      dockerfile: Dockerfile
    container_name: tensol-pr-execution-worker
    restart: unless-stopped
    env_file:
      - /opt/tensol/.env.pr-execution-worker
    environment:
      NODE_ENV: production
      PORT: "8080"
      STHRIP_PR_EXECUTION_ONLY: "true"
    expose:
      # Internal Docker network only. The API server calls this URL from
      # STHRIP_PR_EXECUTION_WORKER_URL; Caddy never exposes the worker.
      - "8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bun -e \"fetch('http://127.0.0.1:8080/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
