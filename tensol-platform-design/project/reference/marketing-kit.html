<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tensol — Autonomous AI pentesting</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ==========================================================================
   Tensol — Colors & Type tokens
   Autonomous AI Pentesting Platform
   ==========================================================================
   Brand DNA: pixel horse · halftone dithering · terminal · mono+sans
   Palette:   white, red, black (high contrast, no chrome)
   ========================================================================== */

@font-face {
  font-family: "TensolMono";
  src: local("JetBrains Mono"), local("IBM Plex Mono"), local("Menlo"), local("Consolas");
  font-display: swap;
}

:root {
  /* ── Core palette ─────────────────────────────────────────────────────── */
  --paper:        #FAF9F6;   /* off-white page bg, slightly warm */
  --paper-pure:   #FFFFFF;   /* pure white when needed */
  --ink:          #0A0A0A;   /* near-black, not pure for warmth */
  --ink-pure:     #000000;
  --red:          #E0001B;   /* primary brand red — alarm, signal */
  --red-deep:     #B30015;   /* pressed / hover dark */
  --red-tint:     #FCE4E7;   /* tinted backgrounds */

  /* ── Greyscale (for terminal / text hierarchy) ────────────────────────── */
  --grey-95: #F2F1ED;
  --grey-90: #E6E4DE;
  --grey-80: #C9C6BE;
  --grey-60: #8A8780;
  --grey-40: #4F4D48;
  --grey-20: #1F1E1B;

  /* ── Semantic foreground / background ─────────────────────────────────── */
  --bg:        var(--paper);
  --bg-alt:    var(--grey-95);
  --bg-inv:    var(--ink);
  --fg:        var(--ink);
  --fg-2:      var(--grey-40);
  --fg-3:      var(--grey-60);
  --fg-inv:    var(--paper);
  --line:      var(--ink);          /* hairlines are usually black */
  --line-soft: var(--grey-80);

  /* ── Status / severity (pentest domain) ───────────────────────────────── */
  --sev-critical: var(--red);
  --sev-high:     #F26B1F;
  --sev-medium:   #B8860B;
  --sev-low:      #5A6B5A;
  --sev-info:     var(--grey-60);
  --ok:           #1F7A3A;

  /* ── Typography stacks ────────────────────────────────────────────────── */
  --font-mono:    "TensolMono", "JetBrains Mono", "IBM Plex Mono", ui-monospace, Menlo, Consolas, monospace;
  --font-sans:    "Neue Haas Grotesk Display Pro", "Helvetica Neue", "Inter", system-ui, -apple-system, sans-serif;
  --font-display: "Space Grotesk", "Neue Haas Grotesk Display Pro", "Helvetica Neue", system-ui, sans-serif;

  /* ── Type scale (8pt grid, slightly tight tracking) ──────────────────── */
  --fs-xs:   11px;
  --fs-sm:   13px;
  --fs-base: 15px;
  --fs-md:   17px;
  --fs-lg:   22px;
  --fs-xl:   32px;
  --fs-2xl:  48px;
  --fs-3xl:  72px;
  --fs-hero: 112px;

  --lh-tight: 1.05;
  --lh-snug:  1.2;
  --lh-base:  1.45;
  --lh-loose: 1.6;

  --tr-tight:  -0.02em;
  --tr-base:   -0.005em;
  --tr-mono:    0;
  --tr-caps:    0.08em;

  /* ── Spacing (8pt) ────────────────────────────────────────────────────── */
  --s-1: 4px;  --s-2: 8px;  --s-3: 12px; --s-4: 16px;
  --s-5: 24px; --s-6: 32px; --s-7: 48px; --s-8: 64px; --s-9: 96px;

  /* ── Radii ────────────────────────────────────────────────────────────── */
  --r-0: 0;       /* DEFAULT for cards/buttons — pixel/terminal aesthetic */
  --r-1: 2px;
  --r-pill: 999px;

  /* ── Borders ──────────────────────────────────────────────────────────── */
  --bw:    1px;
  --bw-2:  2px;
  --bw-3:  3px;

  /* ── Motion ───────────────────────────────────────────────────────────── */
  --ease-out:  cubic-bezier(.22,1,.36,1);
  --ease-step: steps(4, end);   /* pixel-stepped motion */
  --dur-fast:  120ms;
  --dur-base:  200ms;
  --dur-slow:  400ms;
}

/* ── Dark / inverse mode (terminal panel) ─────────────────────────────── */
.tensol-dark, [data-tensol-theme="dark"] {
  --bg:     var(--ink);
  --bg-alt: #141412;
  --bg-inv: var(--paper);
  --fg:     var(--paper);
  --fg-2:   var(--grey-80);
  --fg-3:   var(--grey-60);
  --fg-inv: var(--ink);
  --line:      var(--paper);
  --line-soft: var(--grey-40);
}

/* ==========================================================================
   Semantic typography classes
   ========================================================================== */

.t-hero {
  font-family: var(--font-display);
  font-size: var(--fs-hero);
  line-height: var(--lh-tight);
  letter-spacing: var(--tr-tight);
  font-weight: 500;
}
.t-h1 {
  font-family: var(--font-display);
  font-size: var(--fs-3xl);
  line-height: var(--lh-tight);
  letter-spacing: var(--tr-tight);
  font-weight: 500;
}
.t-h2 {
  font-family: var(--font-display);
  font-size: var(--fs-2xl);
  line-height: var(--lh-snug);
  letter-spacing: var(--tr-tight);
  font-weight: 500;
}
.t-h3 {
  font-family: var(--font-sans);
  font-size: var(--fs-xl);
  line-height: var(--lh-snug);
  letter-spacing: var(--tr-base);
  font-weight: 600;
}
.t-h4 {
  font-family: var(--font-sans);
  font-size: var(--fs-lg);
  line-height: var(--lh-snug);
  font-weight: 600;
}
.t-body {
  font-family: var(--font-sans);
  font-size: var(--fs-base);
  line-height: var(--lh-base);
  font-weight: 400;
}
.t-small {
  font-family: var(--font-sans);
  font-size: var(--fs-sm);
  line-height: var(--lh-base);
}
.t-mono {
  font-family: var(--font-mono);
  font-size: var(--fs-sm);
  line-height: var(--lh-base);
  letter-spacing: var(--tr-mono);
}
.t-mono-lg {
  font-family: var(--font-mono);
  font-size: var(--fs-base);
}
.t-eyebrow {
  font-family: var(--font-mono);
  font-size: var(--fs-xs);
  letter-spacing: var(--tr-caps);
  text-transform: uppercase;
  color: var(--fg-2);
}
.t-label {
  font-family: var(--font-mono);
  font-size: var(--fs-xs);
  letter-spacing: var(--tr-caps);
  text-transform: uppercase;
}

/* ── Element defaults if used directly ─────────────────────────────────── */
body  { font-family: var(--font-sans); color: var(--fg); background: var(--bg); }
h1    { font: 500 var(--fs-3xl)/var(--lh-tight) var(--font-display); letter-spacing: var(--tr-tight); margin: 0; }
h2    { font: 500 var(--fs-2xl)/var(--lh-snug)  var(--font-display); letter-spacing: var(--tr-tight); margin: 0; }
h3    { font: 600 var(--fs-xl)/var(--lh-snug)   var(--font-sans); margin: 0; }
h4    { font: 600 var(--fs-lg)/var(--lh-snug)   var(--font-sans); margin: 0; }
p     { font: 400 var(--fs-base)/var(--lh-base) var(--font-sans); margin: 0; }
code, kbd, samp { font-family: var(--font-mono); font-size: 0.95em; }

</style>

<script>
/* ──────────────────────────────────────────────────────────────────────
   RedPixelWave — full-viewport canvas animation
   A field of cells; each cell's "intensity" = sin wave + perlin-ish noise.
   Above threshold → fill with red. Pixel-stepped via integer cell coords.
   ────────────────────────────────────────────────────────────────────── */
(function pixelWave() {
  const canvas = document.getElementById('pixel-wave');
  const ctx = canvas.getContext('2d');
  const CELL = 10; // px per pixel — bigger = fewer cells
  let W = 0, H = 0, cols = 0, rows = 0;

  function resize() {
    const dpr = 1; // No DPR scaling — perf over crispness
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W;
    canvas.height = H;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    cols = Math.ceil(W / CELL);
    rows = Math.ceil(H / CELL);
  }
  resize();
  window.addEventListener('resize', resize);

  // Cheap pseudo-noise via sin sums — no perlin lib needed
  function noise(x, y, t) {
    const a = Math.sin(x * 0.045 + t * 0.0007) * 0.5;
    const b = Math.sin(y * 0.055 - t * 0.0009) * 0.5;
    const c = Math.sin((x + y) * 0.03 + t * 0.0005) * 0.5;
    const d = Math.sin(Math.hypot(x - cols/2, y - rows/2) * 0.08 - t * 0.0015) * 0.6;
    return (a + b + c + d) / 2.5;
  }

  let raf = 0;
  let lastT = 0;
  function frame(t) {
    // Throttle to ~30fps for perf
    if (t - lastT < 33) { raf = requestAnimationFrame(frame); return; }
    lastT = t;
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#E0001B';
    for (let y = 0; y < rows; y++) {
      for (let x = 0; x < cols; x++) {
        const v = noise(x, y, t);
        if (v > 0.55) {
          ctx.globalAlpha = 0.85;
          ctx.fillRect(x * CELL, y * CELL, CELL - 1, CELL - 1);
        } else if (v > 0.42) {
          ctx.globalAlpha = 0.55;
          ctx.fillRect(x * CELL, y * CELL, CELL - 1, CELL - 1);
        } else if (v > 0.30) {
          ctx.globalAlpha = 0.30;
          ctx.fillRect(x * CELL, y * CELL, CELL - 1, CELL - 1);
        } else if (v > 0.20) {
          ctx.globalAlpha = 0.12;
          ctx.fillRect(x * CELL, y * CELL, CELL - 1, CELL - 1);
        }
      }
    }
    ctx.globalAlpha = 1;
    raf = requestAnimationFrame(frame);
  }
  // Start animation AFTER page mounts (defer 1 frame so React renders first)
  setTimeout(() => { raf = requestAnimationFrame(frame); }, 100);

  document.addEventListener('visibilitychange', () => {
    if (document.hidden) cancelAnimationFrame(raf);
    else raf = requestAnimationFrame(frame);
  });
})();
</script>

/* ── HorseMark — inline SVG via dangerouslySetInnerHTML ──────────────── */
function HorseMark({ size = 64, color = 'currentColor' }) {
  return (
    <span
      aria-hidden="true"
      style={{
        display: 'inline-block',
        width: size,
        height: size * (560/450), // viewBox aspect: 450w x 560h
        color,
        lineHeight: 0,
      }}
      dangerouslySetInnerHTML={{ __html: window.TENSOL_HORSE_SVG.replace('<svg ', '<svg width="100%" height="100%" preserveAspectRatio="xMidYMid meet" ') }}
    />
  );
}

function Wordmark({ size = 22, color = 'currentColor' }) {

    <span style={{
      fontFamily: "'Space Grotesk', sans-serif",

function LogoLockup({ color = 'var(--ink)', size = 22 }) {

}

function Btn({ children, kind = 'primary', size = 'md', onClick, href, ...rest }) {
  const base = {
    fontFamily: "'JetBrains Mono', monospace",
    fontSize: size === 'sm' ? 11 : 13,
    fontWeight: 500,
    letterSpacing: '0.04em',
    textTransform: 'uppercase',
    padding: size === 'sm' ? '6px 12px' : '12px 20px',
    border: '1px solid var(--ink)',
    borderRadius: 0,
    cursor: 'pointer',
    transition: 'all 120ms cubic-bezier(.22,1,.36,1)',
    display: 'inline-flex', alignItems: 'center', gap: 8,
    textDecoration: 'none',
    background: 'var(--ink)', color: 'var(--paper)',
  };
  const kinds = {
    primary:   {},
    secondary: { background: 'var(--paper)', color: 'var(--ink)' },
    red:       { background: 'var(--red)', borderColor: 'var(--red)', color: 'var(--paper)' },
    ghost:     { background: 'transparent', borderColor: 'transparent', color: 'inherit', textDecoration: 'underline', textUnderlineOffset: 4, padding: size === 'sm' ? '6px 0' : '12px 0' },
  };
  const [hov, setHov] = useState(false);
  const hovStyles = {
    primary:   { background: 'var(--paper)', color: 'var(--ink)' },
    secondary: { background: 'var(--ink)', color: 'var(--paper)' },
    red:       { background: 'var(--paper)', color: 'var(--red)' },
    ghost:     { opacity: 0.6 },
  };
  const style = { ...base, ...kinds[kind], ...(hov ? hovStyles[kind] : {}) };
  const Cmp = href ? 'a' : 'button';
  return (
    <Cmp type={href ? undefined : 'button'} href={href} onClick={onClick} style={style}
      onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)} {...rest}>
      {children}
    </Cmp>
  );
}

function Eyebrow({ children, color }) {
  return (
    <div style={{
      fontFamily: "'JetBrains Mono', monospace",
      fontSize: 11,
      letterSpacing: '0.08em',
      textTransform: 'uppercase',

}

function TerminalDemo({ t }) {
  const lines = [
    { t: 'cmd',  s: '$ tensol scan --target lab.acme.com --scope strict' },
    { t: 'ok',   s: '[ok]   scope.validate · 1 target · strict mode · 12ms' },
    { t: 'ok',   s: '[ok]   recon.start · thread t_01HQM4Y2K9XJV' },
    { t: 'ok',   s: '[ok]   browser.signal · /login · reflected param: q · 441ms' },
    { t: 'fail', s: '[fail] exploit.sqli · /search · timing inconclusive' },
    { t: 'ok',   s: '[ok]   exploit.xss · /login?q=<svg/onload=alert> · payload landed' },
    { t: 'ok',   s: '[ok]   validator.xss · evidence_id=ev_8f2c · confirmed' },
    { t: 'sum',  s: '···    finding.report → 1 critical, 0 high' },
  ];
  const [shown, setShown] = useState(0);
  useEffect(() => {
    if (shown >= lines.length) return;
    const id = setTimeout(() => setShown(shown + 1), shown === 0 ? 250 : 380);
    return () => clearTimeout(id);
  }, [shown]);

  const colorFor = (kind) => ({ cmd: 'var(--paper)', ok: '#5BD27F', fail: '#FF5C6A', sum: '#C9C6BE' }[kind]);

  return (
    <section style={{ maxWidth: 1280, margin: '0 auto', padding: '0 64px 120px', position: 'relative' }}>
      <div style={{ display: 'grid', gridTemplateColumns: '320px 1fr', gap: 48, alignItems: 'flex-start' }}>

            fontFamily: "'Space Grotesk', sans-serif", fontWeight: 500,
            fontSize: 36, lineHeight: 1.1, letterSpacing: '-0.02em',
            margin: '14px 0 16px', color: 'var(--ink)',
          }}>{t.termTitle}</h2>
          <p style={{ fontFamily: "'Inter', sans-serif", fontSize: 15, lineHeight: 1.5, color: 'var(--fg-2)' }}>
            {t.termBlurb}

        </div>
        <div style={{
          background: 'var(--ink)', color: 'var(--paper)',
          padding: '20px 24px',
          fontFamily: "'JetBrains Mono', monospace",
          fontSize: 13, lineHeight: 1.7,
          border: '1px solid var(--ink)',
          minHeight: 280,
        }}>
          {lines.slice(0, shown).map((l, i) => (
            <div key={i} style={{ color: colorFor(l.t), whiteSpace: 'pre' }}>{l.s}</div>
          ))}
          {shown < lines.length && (
            <span style={{
              display: 'inline-block', width: 8, height: 14,

              animation: 'tensol-blink 1s steps(2, end) infinite',
            }} />
          )}
        </div>
      </div>
      <style>{`@keyframes tensol-blink { 50% { opacity: 0; } }`}</style>
    </section>
  );

        </div>
      )}
      <NavBar onSignIn={() => setSignedIn(true)} t={t} lang={lang} setLang={setLang} />
      <Hero t={t} />
      <MetricsStrip t={t} />
      <TerminalDemo t={t} />
      <FeatureGrid t={t} />
      <Manifesto t={t} />
      <Footer t={t} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
