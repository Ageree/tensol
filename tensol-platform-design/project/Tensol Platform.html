<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tensol — Autonomous pentesting platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style id="tensol-tokens">
/* ==========================================================================
   Tensol — Colors & Type tokens
   Autonomous AI Pentesting Platform
   ==========================================================================
   Brand DNA: pixel horse · halftone dithering · terminal · mono+sans
   Palette:   white, red, black (high contrast, no chrome)
   ========================================================================== */

@font-face {
  font-family: "TensolMono";
  src: local("JetBrains Mono"), local("IBM Plex Mono"), local("Menlo"), local("Consolas");
  font-display: swap;
}

:root {
  /* ── Core palette ─────────────────────────────────────────────────────── */
  --paper:        #FAF9F6;   /* off-white page bg, slightly warm */
  --paper-pure:   #FFFFFF;   /* pure white when needed */
  --ink:          #0A0A0A;   /* near-black, not pure for warmth */
  --ink-pure:     #000000;
  --red:          #E0001B;   /* primary brand red — alarm, signal */
  --red-deep:     #B30015;   /* pressed / hover dark */
  --red-tint:     #FCE4E7;   /* tinted backgrounds */

  /* ── Greyscale (for terminal / text hierarchy) ────────────────────────── */
  --grey-95: #F2F1ED;
  --grey-90: #E6E4DE;
  --grey-80: #C9C6BE;
  --grey-60: #8A8780;
  --grey-40: #4F4D48;
  --grey-20: #1F1E1B;

  /* ── Semantic foreground / background ─────────────────────────────────── */
  --bg:        var(--paper);
  --bg-alt:    var(--grey-95);
  --bg-inv:    var(--ink);
  --fg:        var(--ink);
  --fg-2:      var(--grey-40);
  --fg-3:      var(--grey-60);
  --fg-inv:    var(--paper);
  --line:      var(--ink);          /* hairlines are usually black */
  --line-soft: var(--grey-80);

  /* ── Status / severity (pentest domain) ───────────────────────────────── */
  --sev-critical: var(--red);
  --sev-high:     #F26B1F;
  --sev-medium:   #B8860B;
  --sev-low:      #5A6B5A;
  --sev-info:     var(--grey-60);
  --ok:           #1F7A3A;

  /* ── Typography stacks ────────────────────────────────────────────────── */
  --font-mono:    "TensolMono", "JetBrains Mono", "IBM Plex Mono", ui-monospace, Menlo, Consolas, monospace;
  --font-sans:    "Neue Haas Grotesk Display Pro", "Helvetica Neue", "Inter", system-ui, -apple-system, sans-serif;
  --font-display: "Space Grotesk", "Neue Haas Grotesk Display Pro", "Helvetica Neue", system-ui, sans-serif;

  /* ── Type scale (8pt grid, slightly tight tracking) ──────────────────── */
  --fs-xs:   11px;
  --fs-sm:   13px;
  --fs-base: 15px;
  --fs-md:   17px;
  --fs-lg:   22px;
  --fs-xl:   32px;
  --fs-2xl:  48px;
  --fs-3xl:  72px;
  --fs-hero: 112px;

  --lh-tight: 1.05;
  --lh-snug:  1.2;
  --lh-base:  1.45;
  --lh-loose: 1.6;

  --tr-tight:  -0.02em;
  --tr-base:   -0.005em;
  --tr-mono:    0;
  --tr-caps:    0.08em;

  /* ── Spacing (8pt) ────────────────────────────────────────────────────── */
  --s-1: 4px;  --s-2: 8px;  --s-3: 12px; --s-4: 16px;
  --s-5: 24px; --s-6: 32px; --s-7: 48px; --s-8: 64px; --s-9: 96px;

  /* ── Radii ────────────────────────────────────────────────────────────── */
  --r-0: 0;       /* DEFAULT for cards/buttons — pixel/terminal aesthetic */
  --r-1: 2px;
  --r-pill: 999px;

  /* ── Borders ──────────────────────────────────────────────────────────── */
  --bw:    1px;
  --bw-2:  2px;
  --bw-3:  3px;

  /* ── Motion ───────────────────────────────────────────────────────────── */
  --ease-out:  cubic-bezier(.22,1,.36,1);
  --ease-step: steps(4, end);   /* pixel-stepped motion */
  --dur-fast:  120ms;
  --dur-base:  200ms;
  --dur-slow:  400ms;
}

/* ── Dark / inverse mode (terminal panel) ─────────────────────────────── */
.tensol-dark, [data-tensol-theme="dark"] {
  --bg:     var(--ink);
  --bg-alt: #141412;
  --bg-inv: var(--paper);
  --fg:     var(--paper);
  --fg-2:   var(--grey-80);
  --fg-3:   var(--grey-60);
  --fg-inv: var(--ink);
  --line:      var(--paper);
  --line-soft: var(--grey-40);
}

/* ==========================================================================
   Semantic typography classes
   ========================================================================== */

.t-hero {
  font-family: var(--font-display);
  font-size: var(--fs-hero);
  line-height: var(--lh-tight);
  letter-spacing: var(--tr-tight);
  font-weight: 500;
}
.t-h1 {
  font-family: var(--font-display);
  font-size: var(--fs-3xl);
  line-height: var(--lh-tight);
  letter-spacing: var(--tr-tight);
  font-weight: 500;
}
.t-h2 {
  font-family: var(--font-display);
  font-size: var(--fs-2xl);
  line-height: var(--lh-snug);
  letter-spacing: var(--tr-tight);
  font-weight: 500;
}
.t-h3 {
  font-family: var(--font-sans);
  font-size: var(--fs-xl);
  line-height: var(--lh-snug);
  letter-spacing: var(--tr-base);
  font-weight: 600;
}
.t-h4 {
  font-family: var(--font-sans);
  font-size: var(--fs-lg);
  line-height: var(--lh-snug);
  font-weight: 600;
}
.t-body {
  font-family: var(--font-sans);
  font-size: var(--fs-base);
  line-height: var(--lh-base);
  font-weight: 400;
}
.t-small {
  font-family: var(--font-sans);
  font-size: var(--fs-sm);
  line-height: var(--lh-base);
}
.t-mono {
  font-family: var(--font-mono);
  font-size: var(--fs-sm);
  line-height: var(--lh-base);
  letter-spacing: var(--tr-mono);
}
.t-mono-lg {
  font-family: var(--font-mono);
  font-size: var(--fs-base);
}
.t-eyebrow {
  font-family: var(--font-mono);
  font-size: var(--fs-xs);
  letter-spacing: var(--tr-caps);
  text-transform: uppercase;
  color: var(--fg-2);
}
.t-label {
  font-family: var(--font-mono);
  font-size: var(--fs-xs);
  letter-spacing: var(--tr-caps);
  text-transform: uppercase;
}

/* ── Element defaults if used directly ─────────────────────────────────── */
body  { font-family: var(--font-sans); color: var(--fg); background: var(--bg); }
h1    { font: 500 var(--fs-3xl)/var(--lh-tight) var(--font-display); letter-spacing: var(--tr-tight); margin: 0; }
h2    { font: 500 var(--fs-2xl)/var(--lh-snug)  var(--font-display); letter-spacing: var(--tr-tight); margin: 0; }
h3    { font: 600 var(--fs-xl)/var(--lh-snug)   var(--font-sans); margin: 0; }
h4    { font: 600 var(--fs-lg)/var(--lh-snug)   var(--font-sans); margin: 0; }
p     { font: 400 var(--fs-base)/var(--lh-base) var(--font-sans); margin: 0; }
code, kbd, samp { font-family: var(--font-mono); font-size: 0.95em; }

</style>
<style>
  html, body { margin: 0; padding: 0; background: var(--paper); }
  *, *::before, *::after { box-sizing: border-box; }
  ::selection { background: var(--red); color: var(--paper); }
  button { font-family: inherit; }
  /* density helpers (toggled at root) */
  [data-density="compact"]  { --pad-step: 0.85; }
  [data-density="comfortable"] { --pad-step: 1; }
  /* dark mode for app screens (paper→ink swap, scoped by attribute) */
  .tensol-app[data-theme="dark"] {
    --paper: #0A0A0A; --paper-pure: #141412;
    --ink: #FAF9F6; --ink-pure: #FFFFFF;
    --bg: #0A0A0A; --bg-2: #141412; --bg-alt: #141412;
    --fg: #FAF9F6; --fg-2: #C9C6BE; --fg-3: #8A8780;
    --line: #FAF9F6; --line-soft: #4F4D48;
  }
  .tensol-app[data-theme="light"] { --bg: var(--paper); --bg-2: var(--grey-95); }
  .tensol-app { --bg-2: var(--grey-95); }

  /* ─────────────────────────────────────────────────────────────────
     Minimalism pass — scoped to in-app screens (C2 → D1).
     Goal: less ink, more whitespace. The marketing landing keeps its
     full editorial weight; the working app should feel like a tool,
     not a poster.
     ───────────────────────────────────────────────────────────────── */

  /* Section heads: shrink the 38px display headlines toward UI scale.
     They compete with the marketing hero and dominate dense screens. */
  .tensol-app h1 {
    font-size: 26px !important;
    letter-spacing: -0.015em !important;
    margin: 0 !important;
  }
  .tensol-app h2 { font-size: 20px !important; }
  /* Page subtitles: smaller, looser, lower contrast. */
  .tensol-app section + p,
  .tensol-app h1 + p { font-size: 13.5px !important; color: var(--fg-3) !important; }

  /* Cards lose their hard black outline → hairline only. Inner section
     dividers (borderBottom on card headers) get downgraded too, so we
     don't get boxes-inside-boxes. */
  .tensol-app [data-card="true"],
  .tensol-app .tensol-card {
    border-color: var(--line-soft) !important;
    background: var(--paper) !important;
  }
  .tensol-app [data-card="true"] > div[style*="border-bottom: 1px solid var(--ink)"],
  .tensol-app [data-card="true"] > div[style*="border-bottom: 1px solid var(--fg)"],
  .tensol-app div[style*="border-bottom: 1px solid var(--ink)"],
  .tensol-app div[style*="border-bottom: 1px solid var(--fg)"] {
    border-bottom-color: var(--line-soft) !important;
  }
  .tensol-app div[style*="border-top: 1px solid var(--fg)"],
  .tensol-app div[style*="border-top: 1px solid var(--ink)"] {
    border-top-color: var(--line-soft) !important;
  }
  .tensol-app div[style*="border-right: 1px solid var(--fg)"],
  .tensol-app div[style*="border-right: 1px solid var(--ink)"] {
    border-right-color: var(--line-soft) !important;
  }
  .tensol-app div[style*="border-left: 1px solid var(--fg)"],
  .tensol-app div[style*="border-left: 1px solid var(--ink)"] {
    border-left-color: var(--line-soft) !important;
  }
  .tensol-app div[style*="border: 1px solid var(--fg)"],
  .tensol-app div[style*="border: 1px solid var(--ink)"] {
    border-color: var(--line-soft) !important;
  }
  .tensol-app table[style*="border: 1px solid var(--fg)"],
  .tensol-app table[style*="border: 1px solid var(--ink)"] {
    border-color: var(--line-soft) !important;
  }

  /* Heavy inverted table headers (black bg, paper text) → quiet hairline
     header. The data is the signal; the chrome shouldn't shout. */
  .tensol-app table thead tr[style*="background: var(--fg)"],
  .tensol-app table thead tr[style*="background: var(--ink)"] {
    background: transparent !important;
    color: var(--fg-2) !important;
  }
  .tensol-app table thead th {
    color: var(--fg-3) !important;
    border-bottom: 1px solid var(--line-soft) !important;
  }

  /* Master-detail row selection: drop the loud red 3px left bar →
     subtle 2px ink bar + lighter selected fill. */
  .tensol-app button[style*="border-left: 3px solid var(--red)"] {
    border-left-width: 2px !important;
    border-left-color: var(--ink) !important;
  }

  /* Eyebrows: tighten the uppercase-mono spam. Most pages stack 4-5 of
     them; reduce visual weight by lowering opacity. */
  .tensol-app [data-eyebrow="true"] { color: var(--fg-3) !important; }

  /* Generic "all-caps mono micro-labels" used inline (Mono with letter
     spacing 0.08em uppercase) tend to over-stamp lists. Lighten color. */
  .tensol-app span[style*="letter-spacing: 0.08em"][style*="uppercase"] {
    color: var(--fg-3) !important;
  }

  /* KPI strips on Live / Dashboard: separators down to hairlines. */
  .tensol-app div[style*="border: 1px solid var(--fg)"] > div[style*="border-right: 1px solid var(--fg)"],
  .tensol-app div[style*="border: 1px solid var(--ink)"] > div[style*="border-right: 1px solid var(--ink)"] {
    border-right-color: var(--line-soft) !important;
  }

  /* Vertical rhythm: more breathing room between major page sections.
     Most screens use marginBottom: 24 between hero/filters/table — bump
     toward 32 with whitespace, not lines. */
  .tensol-app > div > div[data-screen-label] > div[style*="display: grid"][style*="grid-template-columns"] { margin-top: 8px; }

  /* Compact density override: tighter still. */
  .tensol-app[data-density="compact"] h1 { font-size: 22px !important; }
  .tensol-app[data-density="compact"] h2 { font-size: 17px !important; }
</style>

<script type="application/json" id="__tensol_tweaks">
{
  "lang": "en",
  "theme": "light",
  "density": "comfortable",
  "monoRatio": 0.3,
  "redUsage": "reserved",
  "role": "security_lead"
}
</script>

/* HorseMark2 — running stallion (NEW_RICH style). Single-color silhouette. */
function HorseMark2({ size = 200, color = 'currentColor' }) {
  const ratio = (typeof window !== 'undefined' && window.HORSE_RUNNING_RATIO) || 1;
  const src = (typeof window !== 'undefined' && window.HORSE_RUNNING) || '';
  return (
    <span aria-hidden="true" style={{
      display: 'inline-block',
      width: size,
      height: Math.round(size * ratio),
      backgroundColor: color,
      WebkitMaskImage: `url("${src}")`,
      maskImage: `url("${src}")`,
      WebkitMaskRepeat: 'no-repeat',
      maskRepeat: 'no-repeat',
      WebkitMaskSize: 'contain',

      maskPosition: 'center',
      WebkitMaskMode: 'alpha',

      imageRendering: 'pixelated',

}

/* ─────────────────────────────────────────────────────────────────────
   Btn — primary | secondary | red | ghost | dim
   ───────────────────────────────────────────────────────────────────── */
function Btn({ children, kind = 'primary', size = 'md', onClick, href, disabled, fullWidth, title, ...rest }) {
  const padY = size === 'sm' ? 5 : size === 'lg' ? 14 : 9;
  const padX = size === 'sm' ? 10 : size === 'lg' ? 22 : 14;
  const fz   = size === 'sm' ? 11 : size === 'lg' ? 14 : 12;
  const base = {
    fontFamily: "'JetBrains Mono', monospace",
    fontSize: fz,
    fontWeight: 500,
    letterSpacing: '0.04em',
    textTransform: 'uppercase',
    padding: `${padY}px ${padX}px`,
    border: '1px solid var(--fg)',
    borderRadius: 0,
    cursor: disabled ? 'not-allowed' : 'pointer',
    opacity: disabled ? 0.4 : 1,
    transition: 'all 120ms cubic-bezier(.22,1,.36,1)',
    display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 8,
    textDecoration: 'none',
    background: 'var(--fg)', color: 'var(--bg)',
    width: fullWidth ? '100%' : 'auto',
    whiteSpace: 'nowrap',
  };
  const kinds = {
    primary:   {},
    secondary: { background: 'var(--bg)', color: 'var(--fg)' },
    red:       { background: 'var(--red)', borderColor: 'var(--red)', color: 'var(--paper)' },
    ghost:     { background: 'transparent', borderColor: 'transparent', color: 'inherit', textDecoration: 'underline', textUnderlineOffset: 4, padding: `${padY}px 4px` },
    dim:       { background: 'transparent', color: 'var(--fg-2)', borderColor: 'var(--line-soft)' },
  };
  const [hov, setHov] = useState(false);
  const hovStyles = {
    primary:   { background: 'var(--bg)', color: 'var(--fg)' },
    secondary: { background: 'var(--fg)', color: 'var(--bg)' },
    red:       { background: 'var(--paper)', color: 'var(--red)' },
    ghost:     { opacity: 0.6 },
    dim:       { color: 'var(--fg)', borderColor: 'var(--fg)' },
  };
  const style = { ...base, ...kinds[kind], ...(hov && !disabled ? hovStyles[kind] : {}) };
  const Cmp = href ? 'a' : 'button';
  return (
    <Cmp type={href ? undefined : 'button'} href={href} onClick={disabled ? undefined : onClick}
      title={title} style={style} disabled={disabled}
      onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)} {...rest}>
      {children}
    </Cmp>
  );
}

/* ─────────────────────────────────────────────────────────────────────
   Eyebrow / Label / Mono — small uppercase mono labels
   ───────────────────────────────────────────────────────────────────── */
function Eyebrow({ children, color, style }) {
  return (
    <div data-eyebrow="true" style={{
      fontFamily: "'JetBrains Mono', monospace",
      fontSize: 11,
      letterSpacing: '0.08em',
      textTransform: 'uppercase',
      color: color || 'var(--fg-2)',
      ...style,
    }}>{children}</div>
  );
}

function Mono({ children, size = 12, color, style, as: As = 'span' }) {
  return (
    <As style={{
      fontFamily: "'JetBrains Mono', monospace",
      fontSize: size,
      color: color || 'inherit',
      letterSpacing: 0,
      ...style,
    }}>{children}</As>
  );
}

/* ─────────────────────────────────────────────────────────────────────
   Severity / Status badges. Lowercase mono.
   ───────────────────────────────────────────────────────────────────── */
function SeverityChip({ sev, size = 'md' }) {
  const colors = {
    critical: { fg: '#fff',          bg: 'var(--red)',     bd: 'var(--red)' },
    high:     { fg: 'var(--paper)',  bg: '#F26B1F',        bd: '#F26B1F' },
    medium:   { fg: 'var(--ink)',    bg: '#E6C76B',        bd: '#B8860B' },
    low:      { fg: 'var(--ink)',    bg: 'var(--bg)',      bd: '#5A6B5A' },
    info:     { fg: 'var(--fg-2)',   bg: 'var(--bg)',      bd: 'var(--line-soft)' },
  };
  const c = colors[sev] || colors.info;
  const padY = size === 'sm' ? 1 : 2;
  const padX = size === 'sm' ? 5 : 7;
  const fz   = size === 'sm' ? 10 : 11;
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 4,
      fontFamily: "'JetBrains Mono', monospace",
      fontSize: fz,
      letterSpacing: '0.04em',
      padding: `${padY}px ${padX}px`,
      background: c.bg, color: c.fg, border: `1px solid ${c.bd}`,
      lineHeight: 1.3,
    }}>
      <span style={{ width: 6, height: 6, background: c.bd, display: 'inline-block' }} />
      {sev}
    </span>
  );
}

function StatusChip({ status, tone = 'neutral', size = 'md' }) {
  const tones = {
    neutral: { fg: 'var(--fg)',   bg: 'var(--bg)',   bd: 'var(--fg)' },
    ok:      { fg: '#0E5E2A',     bg: '#E5F4EB',     bd: '#1F7A3A' },
    warn:    { fg: '#7A5A05',     bg: '#FBF1D9',     bd: '#B8860B' },
    danger:  { fg: 'var(--paper)',bg: 'var(--red)',  bd: 'var(--red)' },
    muted:   { fg: 'var(--fg-2)', bg: 'var(--bg)',   bd: 'var(--line-soft)' },
    inverse: { fg: 'var(--bg)',   bg: 'var(--fg)',   bd: 'var(--fg)' },
  };
  const c = tones[tone];
  const padY = size === 'sm' ? 1 : 2;
  const padX = size === 'sm' ? 6 : 8;
  const fz   = size === 'sm' ? 10 : 11;
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 6,
      fontFamily: "'JetBrains Mono', monospace",
      fontSize: fz, letterSpacing: '0.04em',
      padding: `${padY}px ${padX}px`,
      background: c.bg, color: c.fg, border: `1px solid ${c.bd}`,
      lineHeight: 1.3,
    }}>{status}</span>
  );
}

/* ─────────────────────────────────────────────────────────────────────
   Card — flat white-on-bg with hairline border
   ───────────────────────────────────────────────────────────────────── */
function Card({ children, style, hover, onClick, title }) {
  const [hov, setHov] = useState(false);
  return (
    <div data-card="true" onClick={onClick} title={title}
      onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{
        background: 'var(--bg)',
        border: `${hov && hover ? 2 : 1}px solid var(--fg)`,
        margin: hov && hover ? -1 : 0,
        cursor: onClick ? 'pointer' : 'default',
        ...style,
      }}>
      {children}
    </div>
  );
}

/* ─────────────────────────────────────────────────────────────────────
   FieldGroup — label + input. Mono label, hard-edge input.
   ───────────────────────────────────────────────────────────────────── */
function Field({ label, hint, error, children }) {
  return (
    <label style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
      <span style={{
        fontFamily: "'JetBrains Mono', monospace",
        fontSize: 11, letterSpacing: '0.08em',
        textTransform: 'uppercase',
        color: error ? 'var(--red)' : 'var(--fg-2)',
      }}>{label}</span>
      {children}
      {hint && !error && (
        <span style={{
          fontFamily: "'JetBrains Mono', monospace",
          fontSize: 11, color: 'var(--fg-3)',
        }}>{hint}</span>
      )}
      {error && (
        <span style={{
          fontFamily: "'JetBrains Mono', monospace",
          fontSize: 11, color: 'var(--red)',
        }}>{error}</span>
      )}
    </label>
  );
}

function Input({ value, onChange, placeholder, type = 'text', error, ...rest }) {
  return (
    <input type={type} value={value} onChange={onChange} placeholder={placeholder}
      style={{
        fontFamily: "'JetBrains Mono', monospace",
        fontSize: 13,
        padding: '10px 12px',
        background: 'var(--bg)',
        color: 'var(--fg)',
        border: `1px solid ${error ? 'var(--red)' : 'var(--fg)'}`,
        borderRadius: 0,
        outline: 'none',
      }} {...rest} />
  );
}

function Textarea({ value, onChange, placeholder, rows = 4, ...rest }) {
  return (
    <textarea value={value} onChange={onChange} placeholder={placeholder} rows={rows}
      style={{
        fontFamily: "'JetBrains Mono', monospace",
        fontSize: 13,
        padding: '10px 12px',
        background: 'var(--bg)',
        color: 'var(--fg)',
        border: '1px solid var(--fg)',
        borderRadius: 0,
        resize: 'vertical',
        outline: 'none',
      }} {...rest} />
  );
}

function Select({ value, onChange, options, ...rest }) {
  return (
    <select value={value} onChange={onChange}
      style={{
        fontFamily: "'JetBrains Mono', monospace",
        fontSize: 13,
        padding: '9px 12px',
        background: 'var(--bg)',
        color: 'var(--fg)',
        border: '1px solid var(--fg)',
        borderRadius: 0,
        outline: 'none',
      }} {...rest}>
      {options.map(o => (
        <option key={o.value || o} value={o.value || o}>{o.label || o}</option>
      ))}
    </select>
  );
}

function Checkbox({ checked, onChange, label, hint, danger }) {
  return (
    <label style={{ display: 'flex', alignItems: 'flex-start', gap: 10, cursor: 'pointer' }}>
      <span style={{
        width: 16, height: 16, flexShrink: 0,
        border: `1px solid ${danger ? 'var(--red)' : 'var(--fg)'}`,
        background: checked ? (danger ? 'var(--red)' : 'var(--fg)') : 'transparent',
        position: 'relative',
        marginTop: 2,
      }}>
        {checked && (
          <span style={{
            position: 'absolute', inset: 0,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            color: 'var(--bg)', fontSize: 12, lineHeight: 1, fontFamily: 'monospace',
          }}>✓</span>
        )}
      </span>
      <input type="checkbox" checked={checked} onChange={onChange} style={{ display: 'none' }} />
      <span style={{ fontSize: 13, lineHeight: 1.4 }}>
        <span>{label}</span>
        {hint && <span style={{ display: 'block', fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: 'var(--fg-3)', marginTop: 2 }}>{hint}</span>}
      </span>
    </label>
  );
}

/* ─────────────────────────────────────────────────────────────────────
   ProgressBar — pixelated step bar
   ───────────────────────────────────────────────────────────────────── */
function ProgressBar({ value, max = 100, segments = 40, color = 'var(--fg)', height = 8, label }) {
  const pct = Math.max(0, Math.min(1, value / max));
  const filled = Math.round(segments * pct);
  return (
    <div>
      {label && (
        <div style={{
          display: 'flex', justifyContent: 'space-between',
          fontFamily: "'JetBrains Mono', monospace", fontSize: 11,
          color: 'var(--fg-2)', marginBottom: 4, letterSpacing: '0.04em',
        }}>
          <span>{label}</span>
          <span>{Math.round(pct * 100)}%</span>
        </div>
      )}
      <div style={{ display: 'flex', gap: 1, height }}>
        {Array.from({ length: segments }).map((_, i) => (
          <span key={i} style={{
            flex: 1,
            background: i < filled ? color : 'var(--line-soft)',
            opacity: i < filled ? 1 : 0.4,
          }} />
        ))}
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────────────────────────────────
   Halftone background — radial-gradient dot pattern, opacity-tunable.
   ───────────────────────────────────────────────────────────────────── */
function HalftoneBg({ size = 8, opacity = 0.18, color = 'var(--fg)', style }) {
  const colorRgb = color === 'var(--paper)' ? '255,255,255' : '10,10,10';
  return (
    <div aria-hidden style={{
      position: 'absolute', inset: 0, pointerEvents: 'none',
      backgroundImage: `radial-gradient(circle, rgba(${colorRgb},${opacity}) 1px, transparent 1.4px)`,
      backgroundSize: `${size}px ${size}px`,
      ...style,
    }} />
  );
}

/* ─────────────────────────────────────────────────────────────────────
   ToolbarToggle — segmented control (mono caps)
   ───────────────────────────────────────────────────────────────────── */
function Segmented({ options, value, onChange, size = 'md' }) {
  const padY = size === 'sm' ? 4 : 6;
  const padX = size === 'sm' ? 8 : 12;
  const fz   = size === 'sm' ? 10 : 11;
  return (
    <div style={{ display: 'inline-flex', border: '1px solid var(--fg)' }}>
      {options.map((opt, i) => {
        const v = opt.value !== undefined ? opt.value : opt;
        const l = opt.label !== undefined ? opt.label : opt;
        return (
          <button key={v} type="button" onClick={() => onChange(v)} style={{
            fontFamily: "'JetBrains Mono', monospace",
            fontSize: fz, letterSpacing: '0.06em', textTransform: 'uppercase',
            padding: `${padY}px ${padX}px`,
            border: 'none',
            borderRight: i < options.length - 1 ? '1px solid var(--fg)' : 'none',
            background: v === value ? 'var(--fg)' : 'transparent',
            color: v === value ? 'var(--bg)' : 'var(--fg)',
            cursor: 'pointer',
          }}>{l}</button>
        );
      })}
    </div>
  );
}

/* ─────────────────────────────────────────────────────────────────────
   AsciiHorse — small ASCII rendition of the horse for hero moments
   ───────────────────────────────────────────────────────────────────── */
const ASCII_HORSE = [
  "                        █▓▓                ",
  "                      ░██▓▓██░             ",
  "                     ▓████▓▓██▓            ",
  "                    ▓██████▓▓██▓           ",
  "                   ▓███████▓▓███           ",
  "                  ▓████████▓███▓           ",
  "                 ▓██████████████▓          ",
  "                ▓███████████████▓          ",
  "          ░░   ▓████████████████░          ",
  "         ▓██▓▓██████████████████           ",
  "        ▓███████████████████████░          ",
  "       ▓████████████████████████▓          ",
  "      ▓██████████████████████████          ",
  "     ▓███████████████████████████░         ",
  "    ▓██████████████   ███████████▓         ",
  "   ▓███████████░       ▓██████████▓        ",
  "  ▓██████████           ▓██████████▓       ",
  " ▓██████████             ▓██████████▓      ",
  "▓██████████               ▓██████████      ",
  " ▓████████                 ▓█████████▓     ",
  "  ▓██████                   ▓████████▓     ",
  "   ▓████                     ▓████████▓    ",
  "    ▓██                       ▓███████▓    ",

function AsciiHorse({ color = 'currentColor', fontSize = 8 }) {
  return (
    <pre style={{
      fontFamily: "'JetBrains Mono', monospace",
      fontSize, lineHeight: 1,
      color, margin: 0, letterSpacing: 0,
      whiteSpace: 'pre',
      userSelect: 'none',
    }}>{ASCII_HORSE.join('\n')}</pre>
  );
}

/* ─────────────────────────────────────────────────────────────────────
   Sparkline — tiny inline series, mono-colored bars
   ───────────────────────────────────────────────────────────────────── */
function Sparkline({ values, height = 28, color = 'var(--fg)' }) {
  const max = Math.max(1, ...values);
  return (
    <div style={{ display: 'flex', alignItems: 'flex-end', gap: 1, height }}>
      {values.map((v, i) => (
        <span key={i} style={{
          flex: 1,
          height: `${Math.max(2, (v / max) * 100)}%`,
          background: color,
          opacity: 0.85,
        }} />
      ))}
    </div>
  );
}

/* ─────────────────────────────────────────────────────────────────────
   ScrollPanel — scrollable inside a hard border
   ───────────────────────────────────────────────────────────────────── */
function Scroll({ children, maxHeight, style }) {
  return (
    <div style={{
      maxHeight,
      overflowY: 'auto',
      ...style,
    }}>{children}</div>
  );
}

/* ─────────────────────────────────────────────────────────────────────
   Modal
   ───────────────────────────────────────────────────────────────────── */
function Modal({ open, onClose, children, width = 560, title }) {
  useEffect(() => {
    if (!open) return;
    const onKey = e => { if (e.key === 'Escape') onClose && onClose(); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [open, onClose]);
  if (!open) return null;
  return (
    <div style={{
      position: 'fixed', inset: 0, zIndex: 200,
      background: 'rgba(10,10,10,0.6)',
      display: 'flex', alignItems: 'flex-start', justifyContent: 'center',
      padding: '80px 24px',
    }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{
        background: 'var(--bg)',
        color: 'var(--fg)',
        border: '1px solid var(--fg)',
        width: '100%', maxWidth: width,
      }}>
        {title && (
          <div style={{
            padding: '14px 20px',
            borderBottom: '1px solid var(--fg)',
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          }}>
            <Mono size={11} style={{ letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--fg-2)' }}>{title}</Mono>
            <button type="button" onClick={onClose} style={{
              background: 'transparent', border: 'none', cursor: 'pointer',
              color: 'var(--fg)', fontFamily: 'monospace', fontSize: 14,
            }}>✕</button>
          </div>
        )}
        {children}
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────────────────────────────────
   Drawer — slides in from the right
   ───────────────────────────────────────────────────────────────────── */
function Drawer({ open, onClose, children, width = 720, title }) {
  useEffect(() => {
    if (!open) return;
    const onKey = e => { if (e.key === 'Escape') onClose && onClose(); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [open, onClose]);
  return (
    <>
      <div onClick={onClose} style={{
        position: 'fixed', inset: 0, zIndex: 190,
        background: open ? 'rgba(10,10,10,0.5)' : 'transparent',
        pointerEvents: open ? 'auto' : 'none',
        transition: 'background 200ms',
      }} />
      <aside style={{
        position: 'fixed', top: 0, right: 0, bottom: 0,
        width, maxWidth: '100vw', zIndex: 195,
        background: 'var(--bg)', color: 'var(--fg)',
        borderLeft: '1px solid var(--fg)',
        transform: open ? 'translateX(0)' : 'translateX(100%)',
        transition: 'transform 240ms cubic-bezier(.22,1,.36,1)',
        display: 'flex', flexDirection: 'column',
      }}>
        {title && (
          <div style={{
            padding: '16px 24px',
            borderBottom: '1px solid var(--fg)',
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            flexShrink: 0,
          }}>
            <Mono size={11} style={{ letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--fg-2)' }}>{title}</Mono>
            <button type="button" onClick={onClose} style={{
              background: 'transparent', border: 'none', cursor: 'pointer',
              color: 'var(--fg)', fontFamily: 'monospace', fontSize: 14,
            }}>✕</button>
          </div>
        )}
        <div style={{ flex: 1, overflowY: 'auto' }}>{children}</div>
      </aside>
    </>
  );
}

/* ─────────────────────────────────────────────────────────────────────
   Tab strip
   ───────────────────────────────────────────────────────────────────── */
function Tabs({ value, onChange, options }) {
  return (
    <div style={{ display: 'flex', borderBottom: '1px solid var(--fg)' }}>
      {options.map(o => {
        const v = o.value !== undefined ? o.value : o;
        const l = o.label !== undefined ? o.label : o;
        return (
          <button key={v} type="button" onClick={() => onChange(v)} style={{
            background: v === value ? 'var(--fg)' : 'transparent',
            color: v === value ? 'var(--bg)' : 'var(--fg)',
            border: 'none',
            padding: '10px 18px',
            cursor: 'pointer',
            fontFamily: "'JetBrains Mono', monospace",
            fontSize: 12, letterSpacing: '0.06em', textTransform: 'uppercase',
            borderRight: '1px solid var(--fg)',
          }}>{l}</button>
        );
      })}
    </div>
  );
}

/* ─────────────────────────────────────────────────────────────────────
   Translation hook — reads i18n + lang from app context
   ───────────────────────────────────────────────────────────────────── */
const TensolCtx = React.createContext(null);
function useTensol() {
  const ctx = React.useContext(TensolCtx);
  if (!ctx) throw new Error('useTensol outside provider');
  return ctx;
}

Object.assign(window, {
  HorseMark, HorseMark2, HorseMark3, Wordmark, LogoLockup, Btn, Eyebrow, Mono,
  SeverityChip, StatusChip, Card, Field, Input, Textarea, Select,
  Checkbox, ProgressBar, HalftoneBg, Segmented, AsciiHorse, Sparkline,
  Scroll, Modal, Drawer, Tabs, TensolCtx, useTensol,
});

    box-shadow:0 0 0 .5px rgba(0,0,0,.18),0 4px 10px rgba(0,0,0,.12)}

    0 2px 6px rgba(0,0,0,.15)}

    display:flex;flex-direction:column;box-shadow:-1px 0 0 rgba(0,0,0,.1)}

  .twk-chip>span>i:first-child{box-shadow:none}

    filter:drop-shadow(0 1px 1px rgba(0,0,0,.3))}
`;

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // Hide the toggle until the host has actually enabled the rail (the
  // __omelette_rail_enabled window message, posted only when the
  // omelette_deck_rail_enabled flag is on for this user). The initial read
  // covers TweaksPanel mounting after the message already arrived; the
  // listener covers the common case of mounting first.
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>
<script type="text/babel">

// Used by all C* and D1 screens.

}

  return (

      minHeight: '100vh', background: 'var(--paper)', color: 'var(--ink)',
      display: 'grid', gridTemplateColumns: '232px 1fr',
    }}>
      {/* LEFT NAV */}
      <aside style={{
        background: 'var(--bg)', borderRight: '1px solid var(--fg)',
        display: 'flex', flexDirection: 'column',
        position: 'sticky', top: 0, height: '100vh',

/* AuthWave — same sum-of-sines wave as the landing hero, but contained
   absolutely inside the auth left panel. Red pixels on paper bg. */
function AuthWave() {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const cvs = ref.current;
    if (!cvs) return;
    const ctx = cvs.getContext('2d');
    const CELL = 14;
    let cols = 0, rows = 0, w = 0, h = 0, raf = 0;
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const resize = () => {
      const rect = cvs.getBoundingClientRect();
      w = rect.width; h = rect.height;
      cvs.width = Math.floor(w * dpr); cvs.height = Math.floor(h * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      cols = Math.ceil(w / CELL) + 2; rows = Math.ceil(h / CELL) + 2;
    };
    resize();
    const ro = new ResizeObserver(resize); ro.observe(cvs);
    const start = performance.now();
    const draw = (now) => {
      const tt = (now - start) / 1000;
      ctx.clearRect(0, 0, w, h);
      for (let y = 0; y < rows; y++) for (let x = 0; x < cols; x++) {
        const v = Math.sin((x * 0.22) + tt * 0.9)
                + Math.sin((y * 0.30) - tt * 0.7)
                + Math.sin((x * 0.10 + y * 0.14) + tt * 0.4);
        const n = v / 3;
        if (n > 0.18) {
          const a = Math.min(0.9, (n - 0.18) * 1.7);
          ctx.fillStyle = 'rgba(250, 249, 246, ' + a.toFixed(3) + ')';
          ctx.fillRect(x * CELL, y * CELL, CELL - 1, CELL - 1);
        }
      }
      raf = requestAnimationFrame(draw);
    };
    raf = requestAnimationFrame(draw);
    return () => { cancelAnimationFrame(raf); ro.disconnect(); };
  }, []);
  return (
    <canvas ref={ref} aria-hidden="true" style={{
      position: 'absolute', inset: 0, width: '100%', height: '100%',
      pointerEvents: 'none',
      maskImage: 'radial-gradient(ellipse 70% 55% at 50% 50%, black 0%, rgba(0,0,0,.4) 60%, transparent 100%)',
      WebkitMaskImage: 'radial-gradient(ellipse 70% 55% at 50% 50%, black 0%, rgba(0,0,0,.4) 60%, transparent 100%)',
    }} />
  );
}

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      cols = Math.ceil(w / CELL) + 2;
      rows = Math.ceil(h / CELL) + 2;
    };
    resize();
    window.addEventListener('resize', resize);

    const start = performance.now();
    const draw = (now) => {
      const tt = (now - start) / 1000;
      ctx.clearRect(0, 0, w, h);
      // wave field — sum of three sines, threshold to red pixels
      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          const v =
            Math.sin((x * 0.22) + tt * 0.9) +
            Math.sin((y * 0.30) - tt * 0.7) +
            Math.sin((x * 0.10 + y * 0.14) + tt * 0.4);
          const n = v / 3;
          if (n > 0.18) {
            const a = Math.min(0.85, (n - 0.18) * 1.6);
            ctx.fillStyle = 'rgba(224, 0, 27, ' + a.toFixed(3) + ')';
            ctx.fillRect(x * CELL, y * CELL, CELL - 1, CELL - 1);
          }
        }
      }
      raf = requestAnimationFrame(draw);
    };
    raf = requestAnimationFrame(draw);
    return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); };
  }, []);
  return (
    <canvas
      ref={ref}
      aria-hidden="true"
      style={{
        position: 'fixed', inset: 0, width: '100%', height: '100%',
        pointerEvents: 'none', zIndex: 0,
        opacity: 0.55,
        mixBlendMode: 'multiply',
        maskImage: 'radial-gradient(ellipse 80% 60% at 70% 40%, black 0%, rgba(0,0,0,.3) 60%, transparent 100%)',

      }}
    />
  );
}

function QrPlaceholder() {
  // deterministic pixel grid that *looks* like a QR
  const seed = (i, j) => {
    const x = (i * 73856093) ^ (j * 19349663);
    return ((x >>> 0) % 7) > 3;
  };
  const N = 21;
  const cells = [];
  for (let i = 0; i < N; i++) for (let j = 0; j < N; j++) {
    // corner finder squares
    const corner = (i < 7 && j < 7) || (i < 7 && j >= N-7) || (i >= N-7 && j < 7);
    let on = seed(i, j);
    if (corner) {
      const li = i < 7 ? i : N-1-i;
      const lj = j < 7 ? j : N-1-j;
      const fi = j < 7 ? j : N-1-j;
      const ci = li, cj = fi;
      on = (ci === 0 || ci === 6 || cj === 0 || cj === 6) || (ci >= 2 && ci <= 4 && cj >= 2 && cj <= 4);
    }
    cells.push(on);
  }
  return (
    <div style={{
      position: 'absolute', inset: 8,
      display: 'grid',
      gridTemplateColumns: `repeat(${N}, 1fr)`,
      gridTemplateRows: `repeat(${N}, 1fr)`,
      gap: 0,
    }}>
      {cells.map((on, i) => <div key={i} style={{ background: on ? 'var(--ink)' : 'transparent' }} />)}
    </div>
  );
}

<script type="text/babel" data-presets="react">
const useStateApp = React.useState;
const useEffectApp = React.useEffect;
const useMemoApp = React.useMemo;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "lang": "en",
  "theme": "light",
  "density": "comfortable",
  "monoRatio": 0.3,
  "redUsage": "reserved",
  "role": "security_lead"
}/*EDITMODE-END*/;

function TensolApp() {
  const [tw, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [route, setRoute] = useStateApp('marketing');
  const lang = tw.lang === 'ru' ? 'ru' : 'en';
  const t = TENSOL_I18N[lang];
  const ctx = useMemoApp(() => ({ t, lang, setLang: (l) => setTweak('lang', l) }), [t, lang]);

  // sync <html lang>
  useEffectApp(() => { document.documentElement.lang = lang; }, [lang]);

  const isApp = route !== 'marketing' && route !== 'login' && route !== 'bootstrap' && route !== 'invite';

  const screen = (() => {
    switch (route) {
      case 'marketing':
        return <MarketingPage onSignIn={() => setRoute('login')} onDemo={() => setRoute('login')} monoRatio={tw.monoRatio} redUsage={tw.redUsage} />;
      case 'login':
        return <LoginScreen onSubmit={() => setRoute('dashboard')} onBack={() => setRoute('marketing')} />;
      case 'bootstrap':
        return <BootstrapScreen onSubmit={() => setRoute('dashboard')} onBack={() => setRoute('marketing')} />;
      case 'invite':
        return <InviteScreen onSubmit={() => setRoute('dashboard')} onBack={() => setRoute('login')} />;
      case 'dashboard':
        return <AppShell route={route} onRoute={setRoute} breadcrumb={[t.navDashboard]} role={tw.role} density={tw.density}>
          <Dashboard onRoute={setRoute} />
        </AppShell>;
      case 'projects':
        return <AppShell route={route} onRoute={setRoute} breadcrumb={[t.navProjects]} role={tw.role} density={tw.density}>
          <ProjectsScreen onRoute={setRoute} role={tw.role} />
        </AppShell>;
      case 'targets':
        return <AppShell route={route} onRoute={setRoute} breadcrumb={[t.navProjects, t.navTargets]} role={tw.role} density={tw.density}>
          <TargetsScreen onRoute={setRoute} role={tw.role} />
        </AppShell>;
      case 'builder':
        return <AppShell route={route} onRoute={setRoute} breadcrumb={[t.navAssessments, t.builderTitle || 'Builder']} role={tw.role} density={tw.density}
          actions={<Btn kind="primary" size="sm" onClick={() => setRoute('approval')}>{t.builderSubmit || 'Submit for approval'} →</Btn>}>
          <BuilderScreen onRoute={setRoute} role={tw.role} />
        </AppShell>;
      case 'approval':
        return <AppShell route={route} onRoute={setRoute} breadcrumb={[t.navAssessments, t.approvalTitle || 'Approval']} role={tw.role} density={tw.density}>
          <ApprovalScreen onRoute={setRoute} role={tw.role} />
        </AppShell>;
      case 'live':
        return <AppShell route={route} onRoute={setRoute} breadcrumb={[t.navAssessments, TENSOL_DATA.assessments[0].id]} role={tw.role} density={tw.density}>
          <LiveScreen onRoute={setRoute} role={tw.role} />
        </AppShell>;
      case 'findings':
        return <AppShell route={route} onRoute={setRoute} breadcrumb={[t.navFindings]} role={tw.role} density={tw.density}>
          <FindingsScreen onRoute={setRoute} role={tw.role} />
        </AppShell>;
      case 'reports':
        return <AppShell route={route} onRoute={setRoute} breadcrumb={[t.navReports]} role={tw.role} density={tw.density}>
          <ReportsScreen onRoute={setRoute} role={tw.role} />
        </AppShell>;
      case 'settings':
        return <AppShell route={route} onRoute={setRoute} breadcrumb={[t.navSettings]} role={tw.role} density={tw.density}>
          <SettingsScreen onRoute={setRoute} role={tw.role} />
        </AppShell>;
      case 'err-403':
      case 'err-404':
      case 'err-500':
        return <AppShell route={route} onRoute={setRoute} breadcrumb={['Error']} role={tw.role} density={tw.density}>
          <ErrorState kind={route.replace('err-', '')} onRoute={setRoute} />
        </AppShell>;
      default:
        return <MarketingPage onSignIn={() => setRoute('login')} onDemo={() => setRoute('login')} monoRatio={tw.monoRatio} redUsage={tw.redUsage} />;
    }
  })();

  return (
    <TensolCtx.Provider value={ctx}>
      <div
        className={isApp ? 'tensol-app' : ''}
        data-theme={tw.theme}
        data-density={tw.density}
        data-screen-label={`${route}`}
      >
        {screen}
      </div>

      <TweaksPanel title="Tweaks · TENSOL">
        <TweakSection title="Locale">
          <TweakRadio label="Language" value={tw.lang} onChange={(v) => setTweak('lang', v)}
            options={[{ value: 'en', label: 'EN' }, { value: 'ru', label: 'RU' }]} />
        </TweakSection>

        <TweakSection title="Navigate">
          <TweakSelect label="Screen" value={route} onChange={setRoute}
            options={[
              { value: 'marketing', label: 'A1 · Landing' },
              { value: 'login', label: 'B2 · Login' },
              { value: 'bootstrap', label: 'B1 · Bootstrap' },
              { value: 'invite', label: 'B3 · Invite signup' },
              { value: 'dashboard', label: 'C1 · Dashboard' },
              { value: 'projects', label: 'C2 · Projects' },
              { value: 'targets', label: 'C3 · Targets' },
              { value: 'builder', label: 'C4 · Assessment builder' },
              { value: 'approval', label: 'C5 · Approval' },
              { value: 'live', label: 'C6 · Live assessment' },
              { value: 'findings', label: 'C7 · Findings + Evidence' },
              { value: 'reports', label: 'C9 · Reports' },
              { value: 'settings', label: 'D1 · Settings' },
              { value: 'err-403', label: 'E3 · 403 RBAC denied' },
              { value: 'err-404', label: 'E3 · 404 not found' },
              { value: 'err-500', label: 'E3 · 5xx server error' },
            ]} />
        </TweakSection>

        <TweakSection title="App theme">
          <TweakRadio label="Theme" value={tw.theme} onChange={(v) => setTweak('theme', v)}
            options={[{ value: 'light', label: 'Paper' }, { value: 'dark', label: 'Ink' }]} />
          <TweakRadio label="Density" value={tw.density} onChange={(v) => setTweak('density', v)}
            options={[{ value: 'comfortable', label: 'Comfort' }, { value: 'compact', label: 'Compact' }]} />
        </TweakSection>

        <TweakSection title="Brand expression">
          <TweakSlider label="Mono dominance" value={tw.monoRatio} min={0.2} max={0.6} step={0.05}
            onChange={(v) => setTweak('monoRatio', v)} format={(v) => `${Math.round(v * 100)}%`} />
          <TweakRadio label="Red usage" value={tw.redUsage} onChange={(v) => setTweak('redUsage', v)}
            options={[{ value: 'reserved', label: 'Reserved' }, { value: 'more', label: 'More' }]} />
        </TweakSection>

        <TweakSection title="Permissions">
          <TweakSelect label="Role" value={tw.role} onChange={(v) => setTweak('role', v)}
            options={[
              { value: 'platform_admin', label: 'platform_admin' },
              { value: 'tenant_admin', label: 'tenant_admin' },
              { value: 'security_lead', label: 'security_lead' },
              { value: 'operator', label: 'operator' },
              { value: 'developer', label: 'developer' },
              { value: 'auditor', label: 'auditor (read-only)' },
              { value: 'viewer', label: 'viewer (read-only)' },
            ]} />
        </TweakSection>
      </TweaksPanel>
    </TensolCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<TensolApp />);
</script>

<style id="tensol-anim">
/* ──────────────────────────────────────────────────────────────────────
   Tensol — motion layer.
   Pixel/terminal aesthetic: short durations, hard easing, no bouncing.
   Most animation is reveal-on-scroll + small ambient loops.
   ────────────────────────────────────────────────────────────────────── */
@keyframes tns-fade-up   { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
@keyframes tns-fade-in   { from { opacity: 0; } to { opacity: 1; } }
@keyframes tns-slide-l   { from { opacity: 0; transform: translateX(-18px); } to { opacity: 1; transform: none; } }
@keyframes tns-wipe      { from { clip-path: inset(0 100% 0 0); } to { clip-path: inset(0 0 0 0); } }
@keyframes tns-blink     { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
@keyframes tns-pulse-red { 0%, 100% { box-shadow: 0 0 0 0 rgba(224,0,27,.55); } 50% { box-shadow: 0 0 0 6px rgba(224,0,27,0); } }
@keyframes tns-scan      { 0% { transform: translateY(-100%); } 100% { transform: translateY(2200%); } }
@keyframes tns-tick      { 0% { transform: scaleX(0); } 100% { transform: scaleX(1); } }
@keyframes tns-marquee   { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
@keyframes tns-horse-bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
@keyframes tns-flicker   { 0%, 100% { opacity: 1; } 47%, 49% { opacity: .55; } 48% { opacity: .8; } }

/* Reveal targets start hidden; tns-anim.js flips data-in="1" when in view. */
[data-tns-reveal]            { opacity: 0; will-change: opacity, transform; }
[data-tns-reveal][data-in="1"] {
  animation: tns-fade-up 520ms cubic-bezier(.22,1,.36,1) forwards;
}
[data-tns-reveal="left"][data-in="1"] {
  animation: tns-slide-l 520ms cubic-bezier(.22,1,.36,1) forwards;
}
[data-tns-reveal="wipe"][data-in="1"] {
  animation: tns-wipe 700ms steps(14, end) forwards, tns-fade-in 200ms linear forwards;
}

/* Stagger children: 60ms steps, capped at ~1s total. */
[data-tns-stagger] > *           { opacity: 0; }
[data-tns-stagger][data-in="1"] > * {
  animation: tns-fade-up 480ms cubic-bezier(.22,1,.36,1) forwards;
}
[data-tns-stagger][data-in="1"] > *:nth-child(1)  { animation-delay:  40ms; }
[data-tns-stagger][data-in="1"] > *:nth-child(2)  { animation-delay: 100ms; }
[data-tns-stagger][data-in="1"] > *:nth-child(3)  { animation-delay: 160ms; }
[data-tns-stagger][data-in="1"] > *:nth-child(4)  { animation-delay: 220ms; }
[data-tns-stagger][data-in="1"] > *:nth-child(5)  { animation-delay: 280ms; }
[data-tns-stagger][data-in="1"] > *:nth-child(n+6){ animation-delay: 340ms; }

/* Typing caret on hero accent line. */
.tns-caret::after {
  content: "▌"; display: inline-block; margin-left: 4px;
  color: var(--red); animation: tns-blink 900ms steps(2, end) infinite;
  font-weight: 400;
}

/* Critical severity chips get a subtle pulse — signals "live alarm". */
.tensol-app [data-screen-label="LIVE"] span[data-status],
[data-tns-pulse="critical"] {
  animation: tns-pulse-red 1800ms ease-out infinite;
}

/* Hero horse mark: a slow, almost-imperceptible bob. */
section [aria-hidden="true"][style*="background-color"] {
  animation: tns-horse-bob 4200ms ease-in-out infinite;
}

/* Hairline progress bars in confirmed-finding card "tick" in. */
[data-tns-reveal][data-in="1"] [data-progress-fill] {
  transform-origin: left center;
  animation: tns-tick 800ms cubic-bezier(.22,1,.36,1) 200ms both;
}

/* Mono terminal lines: line-by-line wipe inside .tns-term-anim. */
.tns-term-anim > * { opacity: 0; }
.tns-term-anim[data-in="1"] > * {
  animation: tns-fade-in 220ms steps(8, end) forwards, tns-wipe 380ms steps(18, end) forwards;
}
.tns-term-anim[data-in="1"] > *:nth-child(1) { animation-delay:   0ms,   0ms; }
.tns-term-anim[data-in="1"] > *:nth-child(2) { animation-delay: 280ms, 280ms; }
.tns-term-anim[data-in="1"] > *:nth-child(3) { animation-delay: 580ms, 580ms; }
.tns-term-anim[data-in="1"] > *:nth-child(4) { animation-delay: 880ms, 880ms; }
.tns-term-anim[data-in="1"] > *:nth-child(5) { animation-delay:1180ms,1180ms; }
.tns-term-anim[data-in="1"] > *:nth-child(n+6){ animation-delay:1480ms,1480ms; }

/* CTA buttons: micro lift on hover. */
button:not([class*="twk-"]):not([class*="deck-"]),
a[role="button"], a.tns-cta {
  transition: transform 140ms cubic-bezier(.22,1,.36,1),
              background-color 140ms ease, color 140ms ease,
              border-color 140ms ease, box-shadow 140ms ease;
}
button:not([class*="twk-"]):not([class*="deck-"]):not(:disabled):hover {
  transform: translateY(-1px);
}
button:not([class*="twk-"]):not([class*="deck-"]):not(:disabled):active {
  transform: translateY(0);
}

/* Dark "proof" terminal: scanline sweep overlay. */
.tns-scanline { position: relative; overflow: hidden; }
.tns-scanline::after {
  content: ""; position: absolute; left: 0; right: 0; top: 0; height: 2px;
  background: linear-gradient(to right, transparent, rgba(255,255,255,.18), transparent);
  pointer-events: none; animation: tns-scan 6s linear infinite;
}

/* Marquee for the trust strip if present. */
.tns-marquee { display: flex; gap: 28px; animation: tns-marquee 28s linear infinite; will-change: transform; }
.tns-marquee:hover { animation-play-state: paused; }

/* Subtle CRT flicker on dark marketing sections. */
section[style*="var(--ink)"][style*="color: var(--paper)"] > * {
  animation: tns-flicker 9s linear infinite;
}

/* Respect reduced motion: kill non-essential keyframes, keep transitions short. */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 1ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 1ms !important;
  }
  [data-tns-reveal], [data-tns-stagger] > * { opacity: 1 !important; transform: none !important; }
}
</style>

<script id="tensol-anim-js">
/* Reveal-on-scroll + ambient hooks. Plain JS so it runs once after React
   mounts and stays out of the component tree. Re-runs whenever the DOM
   changes (route navigation, drawers opening) via a MutationObserver. */
(function () {
  if (window.__tnsAnimBooted) return;
  window.__tnsAnimBooted = true;

  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // 1. Tag marketing primitives so the CSS rules above apply without
  //    needing to edit each React component.
  function tag(root) {
    root = root || document;

    // Marketing headlines + paragraphs become reveal targets.
    var heroH1 = root.querySelectorAll('section h1, section h2, section h3');
    heroH1.forEach(function (el) {
      if (!el.hasAttribute('data-tns-reveal')) el.setAttribute('data-tns-reveal', '');
    });
    var paras = root.querySelectorAll('section > div > p, section p[style*="--fg-2"]');
    paras.forEach(function (el) {
      if (!el.hasAttribute('data-tns-reveal')) el.setAttribute('data-tns-reveal', '');
    });

    // 3-up pillar grids and 5-up pipeline grids get staggered children.
    var grids = root.querySelectorAll(
      'section [style*="repeat(3, 1fr)"], section [style*="repeat(5, 1fr)"]'
    );
    grids.forEach(function (el) {
      if (!el.hasAttribute('data-tns-stagger')) el.setAttribute('data-tns-stagger', '');
    });

    // The dark "confirmed finding" terminal block.
    var terms = root.querySelectorAll(
      'div[style*="\'JetBrains Mono\'"][style*="background: var(--ink)"]'
    );
    terms.forEach(function (el) {
      el.classList.add('tns-term-anim', 'tns-scanline');
    });

    // Critical severity chips → red pulse halo.
    var crit = root.querySelectorAll('[data-sev="critical"], span[style*="--red"][style*="border"]');
    crit.forEach(function (el) {
      // Heuristic: only chips ≤ 140px wide and short text.
      if (el.offsetWidth && el.offsetWidth < 160 && el.textContent.trim().length < 16) {
        el.setAttribute('data-tns-pulse', 'critical');
      }
    });
  }

  // 2. IntersectionObserver flips data-in="1" when 12% of the element is
  //    in view. Once played, we stop observing — animations are one-shot.
  var io = ('IntersectionObserver' in window) && !prefersReduced
    ? new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (e.isIntersecting) {
            e.target.setAttribute('data-in', '1');
            io.unobserve(e.target);
          }
        });
      }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' })
    : null;

  function observe(root) {
    root = root || document;
    var targets = root.querySelectorAll(
      '[data-tns-reveal]:not([data-in="1"]), [data-tns-stagger]:not([data-in="1"]), .tns-term-anim:not([data-in="1"])'
    );
    targets.forEach(function (el) {
      if (io) io.observe(el);
      else el.setAttribute('data-in', '1');
    });
  }

  function refresh() { tag(); observe(); }

  // Boot once React has had a tick to render.
  function boot() {
    refresh();
    var mo = new MutationObserver(function () {
      // debounce — coalesce bursts of mutations into one refresh frame.
      if (mo._raf) return;
      mo._raf = requestAnimationFrame(function () { mo._raf = null; refresh(); });
    });
    mo.observe(document.getElementById('root'), { childList: true, subtree: true });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function () { setTimeout(boot, 50); });
  } else {
    setTimeout(boot, 50);
  }
})();
</script>
</body>
