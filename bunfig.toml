# NOTE: The canonical Bun version pin lives in package.json#packageManager
# (see Sprint 1 contract §2.1, R4/R8). CI and the `bun:assert-version` script
# read from there, not from this file. This file only configures runtime + tests.

[install]
# Reproducible installs in CI.
exact = true

[test]
# Coverage thresholds (Sprint 1 contract A10/A11).
#
# Bun 1.3.11 emits coverage but does NOT fail the run when `coverageThreshold`
# is breached. We therefore use scripts/coverage-gate.ts as the active gate:
# it parses coverage/lcov.info and exits non-zero on any metric < 0.80.
# `bun run test:coverage` chains the test + gate; CI pins this in ci.yml.
# A future Bun version that enforces thresholds natively will make the gate
# redundant; we will remove it then.
coverage = true
coverageThreshold = { line = 0.80, function = 0.80, branch = 0.80, statement = 0.80 }
coverageReporter = ["text", "lcov"]
coverageDir = "coverage"
